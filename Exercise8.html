<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Exercise 8</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="p-10">

    <h2 class="text-xl font-bold text-gray-800 mb-4">Fruit List</h2>

    <ul id="fruitList" class="space-y-2"></ul>

    <script>
      const fruits = ["Mango", "Banana", "Pineapple", "Watermelon", "Orange"];
        const fruitList = document.getElementById("fruitList");
        fruits.forEach(fruit => {
        const li = document.createElement("li");
        li.textContent = fruit;
        li.classList.add("bg-gray-100", "rounded-lg", "px-4", "py-2", "text-gray-700", "text-sm");
        fruitList.appendChild(li);
      });
    </script>

  </body>
</html>
