<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Exercise 4</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="p-10">

    <img
      id="photo"
      src="https://picsum.photos/seed/old/300/200"
      alt="Old image"
      class="rounded-xl shadow mb-3"
    />

    <p id="caption" class="text-gray-500 text-sm">This is the old image</p>

    <script>
      const img = document.getElementById("photo");
      const caption = document.getElementById("caption");
      const newSrc = "https://picsum.photos/seed/new/300/200";
      const newAlt = "New image";   
        const newCaption = "This is the new image";
        img.src = newSrc;
        img.alt = newAlt;
        caption.textContent = newCaption;
    </script>

  </body>
</html>
